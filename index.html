<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026全球民主價值青年對話營工作人員</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", "PingFang TC", sans-serif; background: #f5f6f8; color: #1a1a1a; }
  header { background: #fff; border-bottom: 1px solid #e8e8e8; padding: 1.25rem 1.5rem; position: sticky; top: 0; z-index: 10; }
  .header-inner { max-width: 1100px; margin: 0 auto; }
  header h1 { font-size: 18px; font-weight: 600; }
  header p { font-size: 13px; color: #888; margin-top: 2px; }
  main { max-width: 1100px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
  .filters { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1.25rem; }
  .btn { font-size: 13px; padding: 6px 16px; border-radius: 20px; border: 1px solid #ddd; background: #fff; color: #666; cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .btn:hover { border-color: #aaa; color: #333; }
  .btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; font-weight: 500; }
  .count { font-size: 12px; color: #aaa; margin-bottom: 10px; }
  table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; border: 1px solid #e8e8e8; }
  thead tr { background: #1a1a1a; color: #fff; }
  thead th { padding: 12px 16px; font-size: 13px; font-weight: 500; text-align: left; white-space: nowrap; }
  tbody tr { border-bottom: 1px solid #f0f0f0; transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #fafafa; }
  tbody td { padding: 12px 16px; font-size: 13px; color: #333; vertical-align: top; }
  .badge { display: inline-block; font-size: 11px; padding: 2px 9px; border-radius: 10px; font-weight: 500; white-space: nowrap; }
  .tasks-list { list-style: none; }
  .tasks-list li { padding: 2px 0 2px 14px; position: relative; line-height: 1.6; color: #555; }
  .tasks-list li::before { content: "•"; position: absolute; left: 0; color: #ccc; }
  .same-as { font-size: 13px; color: #aaa; font-style: italic; }
  @media (max-width: 700px) {
    table, thead, tbody, th, td, tr { display: block; }
    thead { display: none; }
    tbody td { border: none; padding: 4px 16px; }
    tbody td:first-child { padding-top: 14px; font-weight: 600; font-size: 14px; }
    tbody td:last-child { padding-bottom: 14px; }
    tbody tr { border-bottom: 1px solid #e8e8e8; }
  }
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <h1>工作人員職責分配</h1>
    <p>共 15 位工作人員 · 6 個組別</p>
  </div>
</header>
<main>
  <div class="filters" id="filters"></div>
  <p class="count" id="count"></p>
  <table>
    <thead>
      <tr>
        <th>姓名</th>
        <th>職位</th>
        <th>房間</th>
        <th>組別</th>
        <th>工作項目</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</main>
<script>
const groups = {
  "總協":  { bg: "#EEEDFE", text: "#3C3489" },
  "接待組": { bg: "#E6F1FB", text: "#0C447C" },
  "器材組": { bg: "#E1F5EE", text: "#085041" },
  "公關組": { bg: "#FAECE7", text: "#993C1D" },
  "活動組": { bg: "#FAEEDA", text: "#854F0B" },
  "生輔組": { bg: "#EAF3DE", text: "#3B6D11" },
  "隊輔組": { bg: "#F1EFE8", text: "#444441" },
};

const queueTasks = [
  "全程陪伴並帶領負責隊伍，維持隊員參與積極度與場內秩序",
  "課程期間協助學員理解課程內容，適時引導小組討論與活動進行",
  "每日早晚關心隊員生活作息，留意隊員情緒與人際狀況",
  "發現隊員異常情況（身體不適、情緒問題）立即通報生輔",
  "協助隊員完成各項任務、課堂作業及成果發表的準備工作",
  "每日參與工作人員檢討會，回報隊伍狀況並接收隔日指示",
];

const staff = [
  { name: "賴以展", role: "總協", room: "A", group: "總協", tasks: [
    "統籌整體活動流程，掌握各組進度與執行狀況",
    "召開行前會議及各階段檢討會，協調各組分工",
    
  ]},
  { name: "凃宥聰", role: "機動", room: "B", group: "接待組", tasks: [
    "負責接待講師，確認到達時間並安排接送事宜",
    "擔任機動支援",
    "處理突發狀況",
  ]},
  { name: "呂岱晏", role: "器材", room: "F", group: "器材組", tasks: [
    "活動前盤點並清查所有器材，製作器材清單",
    "負責場地音響設備架設、測試與調整",
    "管理電腦、投影機、麥克風等設備之借用與歸還",
    "各場次活動前確認音控與簡報播放正常運作",
    "活動結束後回收、整理並歸還所有器材，確認無損壞遺失",
  ]},
  { name: "蔡孟庭", role: "公關", room: "E", group: "公關組", tasks: [
    "負責宣傳發文，規劃社群媒體（IG、FB）內容",
    "活動期間記錄精彩畫面，拍攝照片與影片素材",
    "即時發布活動動態，維持社群互動與曝光",
    "與孫郁琪協作，確認新聞稿是否如期發佈",
  ]},
  { name: "黃俊凱", role: "活動", room: "F", group: "活動組", tasks: [
    "擔任主持人，主持開幕式、閉幕式及各場次活動",
    "負責全體學員集合、解散之指揮與秩序維持",
    "掌控整體活動時間，確保各流程依時程推進",
    "主持成果發表會，協助各隊進行上台報告流程",
    "設計並發放滿意度問卷，活動結束後統一回收整理",
  ]},
  { name: "陳弘意", role: "生輔", room: "G", group: "生輔組", tasks: [
    "負責學員生活起居輔導",
    "每日確認學員出缺席狀況、用餐狀況（尤其吃素同學）",
    "處理學員身體不適、受傷等突發健康狀況",
    "隨總協行動，協助傳達各項指示並執行交辦任務",
  ]},
  { name: "施妤媗", role: "隊輔1", room: "C", group: "隊輔組", tasks: queueTasks, first: true },
  { name: "吳恩萱", role: "隊輔2", room: "C", group: "隊輔組", tasks: null },
  { name: "周品瑜", role: "隊輔3", room: "D", group: "隊輔組", tasks: null },
  { name: "陳筱琴", role: "隊輔4", room: "D", group: "隊輔組", tasks: null },
  { name: "錢威銘", role: "隊輔5", room: "G", group: "隊輔組", tasks: null },
  { name: "李采容", role: "隊輔6", room: "E", group: "隊輔組", tasks: null },
  { name: "倪瑞澤", role: "隊輔7", room: "H", group: "隊輔組", tasks: null },
  { name: "董彥甫", role: "隊輔8", room: "H", group: "隊輔組", tasks: null },
  { name: "王苡媗", role: "隊輔9", room: "E", group: "隊輔組", tasks: null },
];

let active = "全部";
const allGroups = ["全部", ...Object.keys(groups)];

function render() {
  const filtered = active === "全部" ? staff : staff.filter(s => s.group === active);
  document.getElementById("count").textContent = "顯示 " + filtered.length + " 人";

  // 篩選後若隊輔組可見，找出第一個隊輔
  let firstQueueSeen = false;

  document.getElementById("tbody").innerHTML = filtered.map(s => {
    const g = groups[s.group];
    let taskCell = "";
    if (s.group !== "隊輔組") {
      taskCell = `<ul class="tasks-list">${s.tasks.map(t => `<li>${t}</li>`).join("")}</ul>`;
    } else if (!firstQueueSeen) {
      firstQueueSeen = true;
      taskCell = `<ul class="tasks-list">${queueTasks.map(t => `<li>${t}</li>`).join("")}</ul>`;
    } else {
      taskCell = `<span class="same-as">同上</span>`;
    }
    return `<tr>
      <td><strong>${s.name}</strong></td>
      <td>${s.role}</td>
      <td>${s.room}</td>
      <td><span class="badge" style="background:${g.bg};color:${g.text}">${s.group}</span></td>
      <td>${taskCell}</td>
    </tr>`;
  }).join("");
}

function initFilters() {
  document.getElementById("filters").innerHTML = allGroups.map(g =>
    `<button class="btn${g === active ? " active" : ""}" onclick="setFilter('${g}')">${g}</button>`
  ).join("");
}

function setFilter(g) { active = g; initFilters(); render(); }

initFilters();
render();
</script>
</body>
</html>
