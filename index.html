<!DOCTYPE html>

<meta charset="UTF-8">

<title>7月營隊資料</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", "PingFang TC", sans-serif; background: #f5f6f8; color: #1a1a1a; }
  header { background: #fff; border-bottom: 1px solid #e8e8e8; padding: 1rem 1.5rem; position: sticky; top: 0; z-index: 10; }
  .header-inner { max-width: 1100px; margin: 0 auto; }
  header h1 { font-size: 18px; font-weight: 600; }
  .tabs { display: flex; gap: 0; margin-top: 10px; }
  .tab { font-size: 13px; padding: 7px 20px; border: 1px solid #ddd; background: #f5f6f8; color: #888; cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .tab:first-child { border-radius: 8px 0 0 8px; }
  .tab:last-child { border-radius: 0 8px 8px 0; border-left: none; }
  .tab.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; font-weight: 500; }
  main { max-width: 1100px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
  .page { display: none; }
  .page.active { display: block; }
  .filters { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1.25rem; }
  .btn { font-size: 13px; padding: 6px 16px; border-radius: 20px; border: 1px solid #ddd; background: #fff; color: #666; cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .btn:hover { border-color: #aaa; color: #333; }
  .btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; font-weight: 500; }
  .count { font-size: 12px; color: #aaa; margin-bottom: 10px; }
  table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; border: 1px solid #e8e8e8; }
  thead tr { background: #1a1a1a; color: #fff; }
  thead th { padding: 12px 16px; font-size: 13px; font-weight: 500; text-align: left; white-space: nowrap; }
  tbody tr { border-bottom: 1px solid #f0f0f0; transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #fafafa; }
  tbody td { padding: 11px 16px; font-size: 13px; color: #333; vertical-align: middle; text-align: left; border-left: 1px solid #e8e8e8; }
  tbody td:first-child { border-left: none; }

  .badge { display: inline-block; font-size: 11px; padding: 2px 9px; border-radius: 10px; font-weight: 500; white-space: nowrap; }
  .tasks-list { list-style: none; }
  .tasks-list li { padding: 2px 0 2px 14px; position: relative; line-height: 1.6; color: #555; }
  .tasks-list li::before { content: "•"; position: absolute; left: 0; color: #ccc; }
  .same-as { font-size: 13px; color: #aaa; font-style: italic; }
  .g1{background:#E6F1FB;color:#0C447C}.g2{background:#E1F5EE;color:#085041}.g3{background:#EEEDFE;color:#3C3489}.g4{background:#FAEEDA;color:#854F0B}.g5{background:#FAECE7;color:#993C1D}.g6{background:#EAF3DE;color:#3B6D11}.g7{background:#F1EFE8;color:#444441}.g8{background:#FBEAF0;color:#72243E}.g9{background:#FCEBEB;color:#791F1F}
  .stats-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .stat-section h2 { font-size: 15px; font-weight: 600; margin-bottom: 12px; color: #1a1a1a; }
  @media(max-width:900px) { .stats-wrap { grid-template-columns: 1fr; } }
  @media(max-width:700px){table,thead,tbody,th,td,tr{display:block}thead{display:none}tbody td{border:none;padding:4px 16px}tbody td:first-child{padding-top:14px;font-weight:600}tbody td:last-child{padding-bottom:14px}tbody tr{border-bottom:1px solid #e8e8e8}}
</style>
</head>

function switchTab(id){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['staff','members','stats'][i]===id));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
}

let staffFilter="全部";
const staffGroupNames=["全部",...Object.keys(staffGroups)];
function renderStaff(){
  const filtered=staffFilter==="全部"?staffData:staffData.filter(s=>s.group===staffFilter);
  document.getElementById("staff-count").textContent="顯示 "+filtered.length+" 人";
  const queueRows=filtered.filter(s=>s.group==="隊輔組");
  const queueCount=queueRows.length;
  let firstQueue=false;
  document.getElementById("staff-tbody").innerHTML=filtered.map(s=>{
    const g=staffGroups[s.group];
    if(s.group!=="隊輔組"){
      const taskCell=`<ul class="tasks-list">${s.tasks.map(t=>`<li>${t}</li>`).join("")}</ul>`;
      return`<tr><td><strong>${s.name}</strong></td><td><span class="badge" style="background:${g.bg};color:${g.text}">${s.group}</span></td><td>${s.room}</td><td>${taskCell}</td></tr>`;
    } else if(!firstQueue){
      firstQueue=true;
      const taskCell=`<ul class="tasks-list">${queueTasks.map(t=>`<li>${t}</li>`).join("")}</ul>`;
      return`<tr><td><strong>${s.name}</strong></td><td><span class="badge" style="background:${g.bg};color:${g.text}">${s.group}</span></td><td>${s.room}</td><td rowspan="${queueCount}">${taskCell}</td></tr>`;
    } else {
      return`<tr><td><strong>${s.name}</strong></td><td><span class="badge" style="background:${g.bg};color:${g.text}">${s.group}</span></td><td>${s.room}</td></tr>`;
    }
  }).join("");
}
function initStaffFilters(){document.getElementById("staff-filters").innerHTML=staffGroupNames.map(g=>`<button class="btn${g===staffFilter?" active":""}" onclick="setStaffFilter('${g}')">${g}</button>`).join("");}

let memberFilter="全部";
const memberFilterList=["全部","第1組","第2組","第3組","第4組","第5組","第6組","第7組","第8組","第9組","男","女"];
function renderMembers(){
  let filtered=[...memberData];
  if(memberFilter==="男"||memberFilter==="女"){filtered=memberData.filter(m=>m.gender===memberFilter);}
  else if(memberFilter!=="全部"){const g=parseInt(memberFilter.replace("第","").replace("組",""));filtered=memberData.filter(m=>m.group===g);}
  filtered.sort((a,b)=>a.group-b.group);
  document.getElementById("member-count").textContent="顯示 "+filtered.length+" 人";
  document.getElementById("member-tbody").innerHTML=filtered.map(m=>
    `<tr><td><strong>${m.name}</strong></td><td>${m.gender}</td><td>${m.room}</td><td><span class="badge ${groupColors[m.group]}">第${m.group}組</span></td><td>${m.city}</td><td>${m.school}</td></tr>`
  ).join("");
}
function initMemberFilters(){document.getElementById("member-filters").innerHTML=memberFilterList.map(g=>`<button class="btn${g===memberFilter?" active":""}" onclick="setMemberFilter('${g}')">${g}</button>`).join("");}
function setMemberFilter(g){memberFilter=g;initMemberFilters();renderMembers();}
